name: Build Strawberries
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build
        uses: blue-build/github-action@v1
        with:
          recipe: 'recipes/recipe.yml'
          registry_token: ${{ github.token }}
